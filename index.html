<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aslı Ateş</title>
<style>
  :root {
    --ink: #1D1D1F;
    --gray: #6E6E73;
    --line: #D2D2D7;
    --blue: #0071E3;
    --bg: #FFFFFF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  main {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }

  p.role {
    font-size: 15px;
    font-weight: 400;
    color: var(--gray);
    line-height: 1.4;
    margin: 0 0 48px;
  }

  ul.links {
    list-style: none;
    margin: 0;
    padding: 0;
    border-top: 1px solid var(--line);
  }

  ul.links li {
    border-bottom: 1px solid var(--line);
  }

  ul.links a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 4px;
    text-decoration: none;
    color: var(--ink);
    font-size: 17px;
    font-weight: 400;
    transition: color 0.15s ease;
  }

  ul.links a:hover,
  ul.links a:focus-visible {
    color: var(--blue);
  }

  ul.links a:focus-visible {
    outline: none;
  }

  .chevron {
    color: var(--gray);
    font-size: 15px;
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--gray);
  }
</style>
</head>
<body>
<main>
  <h1>Aslı Ateş</h1>
  <p class="role">Visual Communication &amp; UX Designer<br>Brand • Product • Research</p>

  </ul>

  <footer>© 2026 Aslı Ateş</footer>
</main>
</body>
</html>
